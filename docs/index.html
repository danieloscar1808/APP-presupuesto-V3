<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>Presupuestos Pro</title>

  <meta name="theme-color" content="#1f3d63" />

  <!-- MANIFEST -->
  <link rel="manifest" href="./manifest.json" />

  <!-- BOTÓN INSTALAR -->
  <style>
    #install-button {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 18px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 9999;
    }

    #install-button:hover {
      background-color: #1d4ed8;
    }
  </style>
  <script type="module" crossorigin src="/APP-presupuesto-V3/assets/index-D5nbUg_d.js"></script>
<link rel="manifest" href="/APP-presupuesto-V3/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/APP-presupuesto-V3/registerSW.js"></script></head>

<body>

  <!-- ROOT REACT -->
  <div id="root"></div>

  <!-- BOTÓN INSTALAR -->
  <button id="install-button">Instalar Aplicación</button>

  <!-- SCRIPT PRINCIPAL VITE -->

  <!-- CONTROL INSTALACIÓN + SERVICE WORKER -->
  <script>

    let deferredPrompt = null;
    const installButton = document.getElementById("install-button");

    /* =========================
       INSTALACIÓN PWA
    ========================= */

    window.addEventListener("beforeinstallprompt", (e) => {

      e.preventDefault();

      deferredPrompt = e;

      if (installButton) {
        installButton.style.display = "block";
      }

    });

    if (installButton) {

      installButton.addEventListener("click", async () => {

        if (!deferredPrompt) return;

        deferredPrompt.prompt();

        await deferredPrompt.userChoice;

        deferredPrompt = null;

        installButton.style.display = "none";

      });

    }

    window.addEventListener("appinstalled", () => {

      if (installButton) {
        installButton.style.display = "none";
      }

    });

    /* =========================
       SERVICE WORKER
    ========================= */

    if ("serviceWorker" in navigator) {

      window.addEventListener("load", () => {

        navigator.serviceWorker
          .register("/APP-presupuesto-V3/service-worker.js")

          .then((registration) => {

            console.log("Service Worker registrado correctamente");

            if (registration.waiting) {
              registration.waiting.postMessage({ type: "SKIP_WAITING" });
            }

            registration.onupdatefound = () => {

              const newWorker = registration.installing;

              if (!newWorker) return;

              newWorker.onstatechange = () => {

                if (newWorker.state === "installed") {

                  if (navigator.serviceWorker.controller) {

                    console.log("Nueva versión detectada");

                    newWorker.postMessage({ type: "SKIP_WAITING" });

                  }

                }

              };

            };

          })

          .catch(error => {

            console.error("Error registrando Service Worker:", error);

          });

      });

      navigator.serviceWorker.addEventListener("controllerchange", () => {

        console.log("Nueva versión activada");

        window.location.reload();

      });

    }

  </script>

</body>

</html>
