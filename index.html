<!doctype html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>Presupuestos Pro</title>

  <meta name="theme-color" content="#f9ebdc" />

  <!-- Manifest PWA -->
  <link rel="manifest" href="./manifest-v2.json" />

  <!-- Botón instalar -->
  <style>

    #install-button {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 18px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,.2);
      z-index: 9999;
    }

    #install-button:hover {
      background: #1d4ed8;
    }

  </style>

</head>

<body>

  <!-- React root -->
  <div id="root"></div>

  <!-- Botón instalar PWA -->
  <button id="install-button">Instalar Aplicación</button>

  <!-- Vite entry -->
  <script type="module" src="/src/main.tsx"></script>

  <!-- Control instalación -->
  <script>

    let deferredPrompt;
    const installButton = document.getElementById("install-button");

    window.addEventListener("beforeinstallprompt", (e) => {

      e.preventDefault();

      deferredPrompt = e;

      if (installButton) {
        installButton.style.display = "block";
      }

    });

    if (installButton) {

      installButton.addEventListener("click", async () => {

        if (!deferredPrompt) return;

        deferredPrompt.prompt();

        await deferredPrompt.userChoice;

        deferredPrompt = null;

        installButton.style.display = "none";

      });

    }

    window.addEventListener("appinstalled", () => {

      if (installButton) {
        installButton.style.display = "none";
      }

    });

  </script>

</body>

</html>
